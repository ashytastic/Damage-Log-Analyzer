<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ArcheAge · Combat Log Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#09090f;--surface:#111120;--card:#16162a;--card2:#1c1c34;
  --border:#2a2a50;--border2:#3a3a60;
  --text:#e8e0d0;--text-dim:#8080a8;--text-muted:#4a4a70;
  --gold:#d4af37;--gold-light:#f0d060;--gold-glow:#d4af3740;
  --success:#4ade80;--success-bg:#052a15;
  --danger:#f87171;--danger-bg:#2a0a0a;
  --warn:#fbbf24;--warn-bg:#2a1a02;
  --dmg:#f87171;--heal:#4ade80;
  --har:#c05050;--har-bg:#2a1010;
  --nui:#5080c8;--nui-bg:#101828;
  --pir:#9050c0;--pir-bg:#1a1028;
  --unk:#8080a8;--unk-bg:#1c1c34;
}
[data-theme="light"]{
  --bg:#f0ebe0;--surface:#e4ddd0;--card:#fdfaf4;--card2:#f5f0e8;
  --border:#c8b898;--border2:#b0a080;
  --text:#221808;--text-dim:#6a5a38;--text-muted:#a09070;
  --gold:#8b6008;--gold-light:#b88010;--gold-glow:#d4af3728;
  --success:#15803d;--success-bg:#dcfce7;
  --danger:#b91c1c;--danger-bg:#fee2e2;
  --dmg:#b91c1c;--heal:#15803d;
  --har:#991111;--har-bg:#fee2e2;
  --nui:#1155aa;--nui-bg:#dbeafe;
  --pir:#6030a0;--pir-bg:#f3e8ff;
  --unk:#6a5a38;--unk-bg:#f5f0e8;
}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── HEADER ── */
.app-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px 12px;border-bottom:1px solid var(--border);
  background:var(--surface);position:sticky;top:0;z-index:100;gap:12px;flex-wrap:wrap
}
.app-title{
  font-family:'Cinzel',serif;font-size:22px;font-weight:900;letter-spacing:4px;
  background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
}
.app-sub{font-size:10px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:var(--text-muted);margin-top:2px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.icon-btn{
  padding:7px 14px;border:1px solid var(--border);background:var(--card);color:var(--text-dim);
  border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:13px;
  font-weight:700;letter-spacing:1px;transition:all .2s;display:flex;align-items:center;gap:5px
}
.icon-btn:hover{border-color:var(--gold);color:var(--gold)}
.icon-btn.primary{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}

/* ── TABS ── */
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;overflow-x:auto}
.tab-btn{
  display:flex;align-items:center;gap:5px;padding:11px 18px;
  border:none;background:none;color:var(--text-muted);cursor:pointer;
  font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:1.5px;
  border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;white-space:nowrap
}
.tab-btn:hover{color:var(--text-dim)}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

/* ── LAYOUT ── */
.content{max-width:1400px;margin:0 auto;padding:20px 24px 48px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:12px}
.card-title{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.card-sub{font-size:12px;color:var(--text-muted);margin-bottom:12px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ── STAT BOXES ── */
.stat-box{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;text-align:center}
.stat-val{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gold);line-height:1.1}
.stat-val.dmg{color:var(--dmg)}
.stat-val.heal{color:var(--heal)}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text-muted);margin-top:3px}

/* ── FACTION BADGES ── */
.faction-badge{
  display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;
  font-size:11px;font-weight:700;letter-spacing:1px;white-space:nowrap
}
.faction-har{background:var(--har-bg);color:var(--har);border:1px solid var(--har)}
.faction-nui{background:var(--nui-bg);color:var(--nui);border:1px solid var(--nui)}
.faction-pir{background:var(--pir-bg);color:var(--pir);border:1px solid var(--pir)}
.faction-unk{background:var(--unk-bg);color:var(--unk);border:1px solid var(--border)}

/* ── LEADERBOARD ── */
.lb-wrap{padding:4px 0}
.lb-row{
  display:grid;grid-template-columns:44px 1fr auto;align-items:center;
  gap:12px;padding:10px 14px;border-radius:8px;cursor:pointer;transition:background .15s;
  border-bottom:1px solid var(--border)
}
.lb-row:last-child{border-bottom:none}
.lb-row:hover{background:var(--card2)}
.lb-rank{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--text-muted);text-align:center}
.lb-rank.top1{color:var(--gold)}
.lb-rank.top3{color:#c0a060}
.lb-rank.top10{color:var(--text-dim)}
.lb-player-name{font-size:16px;font-weight:700;color:var(--text);margin-bottom:3px;display:flex;align-items:center;gap:8px}
.lb-bar-row{display:flex;align-items:center;gap:8px;margin-top:4px}
.lb-bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.lb-bar-fill{height:100%;border-radius:3px;background:var(--success);transition:width .4s ease}
.lb-bar-uses{font-size:11px;color:var(--text-muted);white-space:nowrap}
.lb-total{font-family:'Cinzel',serif;font-size:17px;font-weight:700;color:var(--dmg);text-align:right}

/* ── SKILLS TABLE ── */
.skill-header{
  display:grid;gap:10px;padding:6px 14px;
  font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--text-muted);border-bottom:1px solid var(--border2)
}
.skill-header.dmg-cols{grid-template-columns:1fr 60px 100px 80px 110px 120px}
.skill-header.heal-cols{grid-template-columns:1fr 60px 100px 80px 120px}
.skill-header.util-cols{grid-template-columns:1fr 80px 1fr}
.skill-row{
  display:grid;gap:10px;padding:10px 14px;align-items:center;
  border-bottom:1px solid var(--border);transition:background .1s;cursor:default
}
.skill-row:hover{background:var(--card2)}
.skill-row:last-child{border-bottom:none}
.skill-row.dmg-cols{grid-template-columns:1fr 60px 100px 80px 110px 120px}
.skill-row.heal-cols{grid-template-columns:1fr 60px 100px 80px 120px}
.skill-row.util-cols{grid-template-columns:1fr 80px 1fr}
.skill-name{font-size:14px;font-weight:700;color:var(--text)}
.skill-uses-badge{
  display:inline-block;padding:2px 8px;border-radius:12px;font-size:12px;font-weight:700;
  background:var(--card2);border:1px solid var(--border);color:var(--text-dim)
}
.skill-dmg-val{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--dmg)}
.skill-heal-val{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--heal)}
.skill-avg-val{font-size:14px;color:var(--text-dim)}
.dps-badge{
  display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;
  background:#3d1010;color:var(--dmg);border:1px solid var(--dmg)
}
.heal-dps-badge{
  display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px;font-weight:700;
  background:var(--success-bg);color:var(--heal);border:1px solid var(--heal)
}
[data-theme="light"] .dps-badge{background:#fee2e2}
[data-theme="light"] .heal-dps-badge{background:var(--success-bg)}
.mini-bar-track{width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .4s ease}
.mini-bar-dmg{background:var(--dmg)}
.mini-bar-heal{background:var(--heal)}
.mini-bar-util{background:var(--gold)}

/* ── DEBUFF TABLE ── */
.debuff-row{
  display:grid;grid-template-columns:1fr 80px 80px 1fr;gap:12px;
  align-items:center;padding:9px 14px;border-bottom:1px solid var(--border);transition:background .1s
}
.debuff-row:last-child{border-bottom:none}
.debuff-row:hover{background:var(--card2)}
.debuff-name{font-size:14px;font-weight:700;color:var(--warn)}
.debuff-count{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--text);text-align:center}
.debuff-targets{font-size:13px;color:var(--text-dim);text-align:center}

/* ── AWARDS ── */
.award-chip{
  display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;
  font-size:12px;font-weight:700;background:var(--gold-glow);color:var(--gold);
  border:1px solid var(--gold);margin:3px
}

/* ── SUB TABS ── */
.sub-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.sub-tab{
  padding:5px 14px;border:1px solid var(--border);border-radius:6px;cursor:pointer;
  font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  color:var(--text-muted);background:none;font-family:'Rajdhani',sans-serif;transition:all .2s
}
.sub-tab:hover{border-color:var(--gold);color:var(--gold)}
.sub-tab.active{background:var(--gold-glow);border-color:var(--gold);color:var(--gold)}

/* ── SEARCH ── */
.search-input{
  width:100%;padding:8px 12px;background:var(--surface);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;
  font-weight:600;outline:none;transition:border-color .2s;margin-bottom:12px
}
.search-input:focus{border-color:var(--gold)}
.search-input::placeholder{color:var(--text-muted)}

/* ── PLAYER MODAL ── */
.modal-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;
  display:flex;align-items:center;justify-content:center;padding:20px
}
.modal-panel{
  background:var(--card);border:1px solid var(--border2);border-radius:12px;
  max-width:860px;width:100%;max-height:85vh;overflow-y:auto;position:relative
}
.modal-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:20px 22px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;
  background:var(--card);z-index:10
}
.modal-player-name{font-family:'Cinzel',serif;font-size:26px;font-weight:900;color:var(--success);line-height:1.1;margin-bottom:4px}
.modal-close{
  padding:5px 12px;border:1px solid var(--border);background:none;color:var(--text-muted);
  cursor:pointer;border-radius:6px;font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700
}
.modal-close:hover{border-color:var(--danger);color:var(--danger)}
.modal-body{padding:18px 22px}
.modal-section{margin-bottom:20px}
.modal-section-title{
  font-family:'Cinzel',serif;font-size:14px;font-weight:700;letter-spacing:2px;
  color:var(--gold);margin-bottom:10px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px
}
.targets-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 0;border-bottom:1px solid var(--border);gap:12px
}
.targets-row:last-child{border-bottom:none}
.targets-row-name{font-size:14px;font-weight:600;color:var(--text);flex:1}
.targets-bar-wrap{flex:2;display:flex;align-items:center;gap:8px}
.targets-dmg{font-size:14px;font-weight:700;color:var(--dmg);white-space:nowrap;font-family:'Cinzel',serif}

/* ── UPLOAD SCREEN ── */
.upload-page{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:calc(100vh - 60px);padding:40px 20px;text-align:center
}
.upload-area{
  border:2px dashed var(--border2);border-radius:16px;padding:56px 48px;
  max-width:520px;width:100%;cursor:pointer;transition:all .2s;background:var(--card)
}
.upload-area:hover{border-color:var(--gold);background:var(--card2)}
.upload-area.drag-over{border-color:var(--gold);background:var(--card2);box-shadow:0 0 24px var(--gold-glow)}
.upload-icon{font-size:52px;margin-bottom:18px;display:block}
.upload-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;letter-spacing:3px;color:var(--text);margin-bottom:8px}
.upload-hint{font-size:14px;color:var(--text-muted);line-height:1.6;margin-bottom:22px}
.upload-btn{
  display:inline-flex;align-items:center;gap:8px;padding:11px 28px;
  background:var(--gold-glow);border:1px solid var(--gold);color:var(--gold);
  border-radius:8px;cursor:pointer;font-family:'Cinzel',serif;font-size:13px;
  font-weight:700;letter-spacing:2px;transition:all .2s
}
.upload-btn:hover{background:var(--gold);color:#09090f}

/* ── FACTION ASSIGN ── */
.player-assign-row{
  display:flex;align-items:center;justify-content:space-between;padding:8px 12px;
  border-bottom:1px solid var(--border);gap:10px
}
.faction-sel-grp{display:flex;gap:4px}
.faction-sel-btn{
  padding:4px 10px;border-radius:4px;border:1px solid var(--border);cursor:pointer;
  font-size:11px;font-weight:700;letter-spacing:1px;background:none;color:var(--text-muted);
  font-family:'Rajdhani',sans-serif;transition:all .15s
}
.faction-sel-btn.har.active,.faction-sel-btn.har:hover{background:var(--har-bg);border-color:var(--har);color:var(--har)}
.faction-sel-btn.nui.active,.faction-sel-btn.nui:hover{background:var(--nui-bg);border-color:var(--nui);color:var(--nui)}
.faction-sel-btn.pir.active,.faction-sel-btn.pir:hover{background:var(--pir-bg);border-color:var(--pir);color:var(--pir)}
.faction-sel-btn.unk.active,.faction-sel-btn.unk:hover{background:var(--unk-bg);border-color:var(--border);color:var(--unk)}

/* ── MISC ── */
.empty{padding:32px;text-align:center;color:var(--text-muted);font-size:14px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px;font-weight:700;letter-spacing:1px}
.badge-ok{background:var(--success-bg);color:var(--success);border:1px solid var(--success)}
.badge-warn{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn)}
.badge-dmg{background:var(--danger-bg);color:var(--dmg);border:1px solid var(--dmg)}
.flex-between{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.mb8{margin-bottom:8px}
.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}
.scroll-x{overflow-x:auto;-webkit-overflow-scrolling:touch}
.overview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
@media(max-width:900px){.overview-grid{grid-template-columns:repeat(2,1fr)}.g4{grid-template-columns:1fr 1fr}.skill-header.dmg-cols,.skill-row.dmg-cols{grid-template-columns:1fr 60px 90px 90px}.skill-header.dmg-cols>:nth-child(5),.skill-row.dmg-cols>:nth-child(5),.skill-header.dmg-cols>:nth-child(6),.skill-row.dmg-cols>:nth-child(6){display:none}}
@media(max-width:600px){.overview-grid{grid-template-columns:1fr 1fr}.lb-row{grid-template-columns:36px 1fr auto}.content{padding:12px 12px 48px}.skill-header.dmg-cols,.skill-row.dmg-cols{grid-template-columns:1fr 60px 100px}.skill-header.dmg-cols>:nth-child(4),.skill-row.dmg-cols>:nth-child(4),.skill-header.dmg-cols>:nth-child(5),.skill-row.dmg-cols>:nth-child(5),.skill-header.dmg-cols>:nth-child(6),.skill-row.dmg-cols>:nth-child(6){display:none}}
</style>
</head>

/* ════════════════════ UTILITIES ════════════════════ */
function fmtNum(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(2) + 'B';
  if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return Math.round(n).toString();
}
function fmtDps(dmg, dur) {
  const d = dmg / Math.max(1, dur);
  return fmtNum(Math.round(d));
}
function fmtDur(sec) {
  const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60);
  if (h > 0) return `${h}h ${String(m).padStart(2,'0')}m`;
  return `${m}m ${String(s).padStart(2,'0')}s`;
}

function saveHiddenSkills(s) { lsSet(LS_HIDDEN_SKILLS, [...s]); }

/* NPC_GZ_B64 is injected below by the build step */
/* isNpc — check whether a name should be treated as an NPC.
   Priority: user override > hardcoded blacklist > assume player */
function isNpc(name, npcSet, npcOverrides) {
  const ov = (npcOverrides || {})[name];
  if (ov === 'player') return false;
  if (ov === 'npc')    return true;
  return !!(npcSet && npcSet.has(name));
}

/* World bosses — damage dealt to these counts as "Boss" (PvE) rather than
   being excluded entirely. All other NPC targets are dropped from totals. */
const BOSS_NAMES = new Set([
  "Black Dragon",      "Dragon noir",           // EN / FR
  "Ксанатос",          "黑龙柯萨纳斯",           // RU / CN
  "Anthalon",          "Анталлон, призрак войны","扭曲者安塔伦",  // EN / RU / CN
]);

/**
 * Recompute a player's damage breakdown using the live NPC filter.
 * Returns { pvp, boss, total }
 *   pvp  — damage dealt to confirmed non-NPC targets (player vs player)
 *   boss — damage dealt to world-boss targets (PvE that still matters)
 *   total — pvp + boss (NPC damage excluded)
 * Falls back to parser values while npcSet is still loading.
 */
function computeDmgBreakdown(player, npcSet, npcOverrides) {
  if (npcSet === null) {
    // NPC set not yet loaded — use parser's best-guess values
    return { pvp: player.pvpDmg, boss: player.pveDmg, total: player.totalDmg };
  }
  let pvp = 0, boss = 0;
  for (const [target, dmg] of Object.entries(player.targets)) {
    if (BOSS_NAMES.has(target)) boss += dmg;
    else if (!isNpc(target, npcSet, npcOverrides)) pvp += dmg;
    // else: regular NPC target — excluded from all totals
  }
  return { pvp, boss, total: pvp + boss };
}

/* Auto-detect skill category from log data, then apply any manual pin */
function getSkillCategory(skillName, skillData, skillCats) {
  const pinned = (skillCats || {})[skillName];
  if (pinned) return pinned;
  if (skillData.totalDmg  > 0) return 'damage';
  if (skillData.totalHeal > 0) return 'healing';
  return 'utility';
}

/* Decompress the embedded gzip+base64 NPC name list into a Set.
   Uses the browser's native DecompressionStream (Chrome 80+, FF 113+, Safari 16.4+). */
async function loadNpcSet() {
  try {
    if (typeof NPC_GZ_B64 === 'undefined' || !NPC_GZ_B64) return new Set();
    const bin = Uint8Array.from(atob(NPC_GZ_B64), c => c.charCodeAt(0));
    const ds  = new DecompressionStream('gzip');
    const writer = ds.writable.getWriter();
    const reader = ds.readable.getReader();
    writer.write(bin); writer.close();
    const chunks = [];
    for (;;) { const { done, value } = await reader.read(); if (done) break; chunks.push(value); }
    let offset = 0, total = chunks.reduce((s,c)=>s+c.length,0);
    const buf = new Uint8Array(total);
    for (const c of chunks) { buf.set(c, offset); offset += c.length; }
    return new Set(JSON.parse(new TextDecoder().decode(buf)));
  } catch(e) { console.error('NPC set load failed:', e); return new Set(); }
}

/* ════════════════════ PARSER ════════════════════ */
/*
  Log line format (after strip):
    ACTOR [EVENT_TEXT]

  Events captured:
    damage:   ACTOR attacked TARGET using SKILL and caused -N Health (RESULT)!
    blocked:  ACTOR attacked TARGET using SKILL! Attack Blocked, resulting in -N damage.
    heal:     ACTOR targeted TARGET using SKILL to restore N health.
    debuff:   TARGET was struck by a DEBUFF debuff!
    buff_get: ACTOR gained the buff: BUFF.
    cast_ok:  ACTOR successfully cast SKILL!
    fall:     ACTOR took N Fall damage.
*/
function stripColors(s) {
  return s.replace(/\|cff[a-fA-F0-9]{6}/g, '').replace(/\|r/g, '');
}

function parseLog(rawText) {
  const lines = rawText.replace(/\r\n/g, '\n').split('\n');

  // Data containers
  const players = Object.create(null);   // name → PlayerRecord
  const skillsMap = Object.create(null); // skill → {totalDmg, totalHeal, uses, players:{name→dmg}}
  const debuffMap = Object.create(null); // debuff → {count, targets: Set}
  let sessionStart = null, sessionEnd = null;
  const confirmedActors = new Set(); // names that attacked/healed/cast

  const RE_HEADER = /^<(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2})\|ic23895;/;
  const RE_DAMAGE  = /^(.+) attacked (.+) using (.+) and caused -(\d+) Health \((.+?)\)!$/;
  const RE_BLOCKED = /^(.+) attacked (.+) using (.+)! Attack Blocked, resulting in -(\d+) damage\.$/;
  const RE_HEAL    = /^(.+) targeted (.+) using (.+) to restore (\d+) health\.$/;
  const RE_DEBUFF  = /^(.+) was struck by a (.+) debuff!$/;
  const RE_BUFFGET = /^(.+) gained the buff: (.+)\.$/;
  const RE_CASTOK  = /^(.+) successfully cast (.+)!$/;
  const RE_FALL    = /^(.+) took (\d+) Fall damage\.$/;

  function mkPlayer(name) {
    if (!players[name]) players[name] = {
      name, faction:'unknown',
      totalDmg:0, pvpDmg:0, pveDmg:0, totalHeal:0,
      critCount:0, attackCount:0,
      skills:Object.create(null),    // {uses,totalDmg,critCount}
      healSkills:Object.create(null),// {uses,totalHeal}
      targets:Object.create(null),   // target→dmg
      healTargets:Object.create(null),
      receivedFrom:Object.create(null),
      debuffsApplied:Object.create(null),
      debuffsReceived:Object.create(null),
      casts:Object.create(null),     // skill→count (successful casts)
      firstSeen:null, lastSeen:null,
    };
    return players[name];
  }
  function touch(name, ts) {
    const p = mkPlayer(name);
    if (!p.firstSeen || ts < p.firstSeen) p.firstSeen = ts;
    if (!p.lastSeen  || ts > p.lastSeen)  p.lastSeen  = ts;
  }
  function mkSkillGlobal(skill) {
    if (!skillsMap[skill]) skillsMap[skill] = { totalDmg:0, totalHeal:0, uses:0, players:Object.create(null) };
    return skillsMap[skill];
  }
  function mkDebuff(name) {
    if (!debuffMap[name]) debuffMap[name] = { count:0, targets:new Set() };
    return debuffMap[name];
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    const hm = line.match(RE_HEADER);
    if (!hm) continue;

    const ts = new Date(hm[1]);
    if (!sessionStart || ts < sessionStart) sessionStart = ts;
    if (!sessionEnd   || ts > sessionEnd)   sessionEnd   = ts;

    const content = stripColors(line.slice(hm[0].length));

    let m;

    // — Damage —
    if ((m = content.match(RE_DAMAGE))) {
      const [,attacker,target,skill,amtStr,result] = m;
      const amt = parseInt(amtStr,10); if (isNaN(amt)||amt<=0) continue;
      const crit = result.includes('Critical');
      confirmedActors.add(attacker);
      touch(attacker, ts);
      const p = mkPlayer(attacker);
      p.totalDmg += amt; p.attackCount++; if(crit) p.critCount++;
      const sk = (p.skills[skill] ??= {uses:0,totalDmg:0,critCount:0});
      sk.uses++; sk.totalDmg += amt; if(crit) sk.critCount++;
      p.targets[target] = (p.targets[target]||0) + amt;
      touch(target, ts);
      mkPlayer(target).receivedFrom[attacker] = (mkPlayer(target).receivedFrom[attacker]||0) + amt;
      const sg = mkSkillGlobal(skill);
      sg.totalDmg += amt; sg.uses++;
      sg.players[attacker] = (sg.players[attacker]||0) + amt;
      continue;
    }

    // — Blocked damage —
    if ((m = content.match(RE_BLOCKED))) {
      const [,attacker,target,skill,amtStr] = m;
      const amt = parseInt(amtStr,10); if (isNaN(amt)||amt<=0) continue;
      confirmedActors.add(attacker);
      touch(attacker, ts);
      const p = mkPlayer(attacker);
      p.totalDmg += amt; p.attackCount++;
      const sk = (p.skills[skill] ??= {uses:0,totalDmg:0,critCount:0});
      sk.uses++; sk.totalDmg += amt;
      p.targets[target] = (p.targets[target]||0) + amt;
      touch(target, ts);
      mkPlayer(target).receivedFrom[attacker] = (mkPlayer(target).receivedFrom[attacker]||0) + amt;
      const sg = mkSkillGlobal(skill);
      sg.totalDmg += amt; sg.uses++;
      sg.players[attacker] = (sg.players[attacker]||0) + amt;
      continue;
    }

    // — Heal —
    if ((m = content.match(RE_HEAL))) {
      const [,healer,target,skill,amtStr] = m;
      const amt = parseInt(amtStr,10); if (isNaN(amt)||amt<=0) continue;
      confirmedActors.add(healer);
      touch(healer, ts);
      const p = mkPlayer(healer);
      p.totalHeal += amt;
      // Track per-skill targets; mark self-heals with "(self)"
      const hsk = (p.healSkills[skill] ??= {uses:0,totalHeal:0,targets:Object.create(null)});
      hsk.uses++; hsk.totalHeal += amt;
      const tLabel = (healer === target) ? '(self)' : target;
      hsk.targets[tLabel] = (hsk.targets[tLabel]||0) + amt;
      p.healTargets[target] = (p.healTargets[target]||0) + amt;
      touch(target, ts);
      const sg = mkSkillGlobal(skill);
      sg.totalHeal += amt; sg.uses++;
      continue;
    }

    // — Debuff applied —
    if ((m = content.match(RE_DEBUFF))) {
      const [,target,debuff] = m;
      touch(target, ts);
      mkPlayer(target).debuffsReceived[debuff] = (mkPlayer(target).debuffsReceived[debuff]||0) + 1;
      const db = mkDebuff(debuff); db.count++; db.targets.add(target);
      continue;
    }

    // — Buff gained —
    if ((m = content.match(RE_BUFFGET))) {
      touch(m[1], ts);
      continue;
    }

    // — Successful cast —
    if ((m = content.match(RE_CASTOK))) {
      const [,caster,skill] = m;
      confirmedActors.add(caster);
      touch(caster, ts);
      const p = mkPlayer(caster);
      p.casts[skill] = (p.casts[skill]||0) + 1;
    }
  } // end line loop

  // Post-process: PvP vs PvE
  for (const p of Object.values(players)) {
    for (const [target, dmg] of Object.entries(p.targets)) {
      if (confirmedActors.has(target)) p.pvpDmg += dmg;
      else p.pveDmg += dmg;
    }
  }

  // Session duration
  const dur = sessionStart && sessionEnd
    ? Math.max(1, (sessionEnd - sessionStart) / 1000) : 1;

  // Awards: per skill, who dealt the most damage?
  const awards = Object.create(null); // playerName → [{skill, dmg}]
  for (const [skill, sg] of Object.entries(skillsMap)) {
    if (sg.totalDmg === 0) continue;
    let best = null, bestDmg = 0;
    for (const [pn, dmg] of Object.entries(sg.players)) {
      if (dmg > bestDmg) { bestDmg = dmg; best = pn; }
    }
    if (best) {
      (awards[best] ??= []).push({ skill, dmg: bestDmg });
    }
  }

  return { players, skillsMap, debuffMap, sessionStart, sessionEnd, dur,
           confirmedActors, awards, totalLines: lines.length };
}

/* ════════════════════ LEADERBOARD ════════════════════ */
function LeaderboardTab({ data, factions, npcSet, npcOverrides, setNpcOverride, onPlayerClick }) {
  const [search, setSearch] = useState('');
  const [sort, setSort] = useState('dmg');
  const [showNpcs, setShowNpcs] = useState(false);
  const allPlayers = Object.values(data.players);
  const filtered = useMemo(() => {
    const q = search.toLowerCase();
    return allPlayers
      .filter(p => {
        if (!showNpcs && isNpc(p.name, npcSet, npcOverrides)) return false;
        return !q || p.name.toLowerCase().includes(q);
      })
      .sort((a,b) => {
        if (sort==='heal') return b.totalHeal - a.totalHeal;
        const ba = computeDmgBreakdown(a, npcSet, npcOverrides);
        const bb = computeDmgBreakdown(b, npcSet, npcOverrides);
        if (sort==='pvp')  return bb.pvp  - ba.pvp;
        if (sort==='boss') return bb.boss - ba.boss;
        return bb.total - ba.total; // 'dmg' = pvp + boss
      });
  }, [allPlayers, search, sort, npcSet, npcOverrides, showNpcs]);

  const npcCount = allPlayers.filter(p=>isNpc(p.name, npcSet, npcOverrides)).length;

  function getSortVal(p) {
    if (sort==='heal') return p.totalHeal;
    const bd = computeDmgBreakdown(p, npcSet, npcOverrides);
    if (sort==='pvp')  return bd.pvp;
    if (sort==='boss') return bd.boss;
    return bd.total; // 'dmg'
  }
  function getColor()    { return sort==='heal'?'var(--heal)':sort==='boss'?'var(--gold)':'var(--dmg)'; }
  function rankClass(i)  { return i===0?'lb-rank top1':i<3?'lb-rank top3':i<10?'lb-rank top10':'lb-rank'; }
  const maxVal = filtered.reduce((m,p)=>Math.max(m,getSortVal(p)),1);

  return (
    <div>
      <div style={{display:'flex',gap:'10px',marginBottom:'10px',flexWrap:'wrap',alignItems:'center'}}>
        <input className="search-input" style={{margin:0,flex:1,minWidth:'180px'}}
          placeholder="Search player…" value={search} onChange={e=>setSearch(e.target.value)} />
        <div style={{display:'flex',gap:'5px',flexWrap:'wrap'}}>
          {[['dmg','⚔ Damage'],['heal','💚 Healing'],['pvp','🗡 PvP'],['boss','🐉 Boss']].map(([k,l])=>(
            <button key={k} className={'sub-tab'+(sort===k?' active':'')} onClick={()=>setSort(k)}>{l}</button>
          ))}
        </div>
        {npcCount > 0 && (
          <button className={'sub-tab'+(showNpcs?' active':'')} style={{padding:'4px 10px'}}
            onClick={()=>setShowNpcs(s=>!s)}>
            {showNpcs?'👁 Showing':'🚫 Hiding'} {npcCount} NPC{npcCount!==1?'s':''}
          </button>
        )}
      </div>
      <div className="card" style={{padding:'8px 0'}}>
        <div className="lb-wrap">
          {filtered.length ? filtered.map((p,i)=>{
            const val  = getSortVal(p);
            const pct  = val / maxVal * 100;
            const npc  = isNpc(p.name, npcSet, npcOverrides);
            const totalUses = Object.values(p.skills).reduce((s,sk)=>s+sk.uses,0);
            return (
              <div key={p.name} className="lb-row"
                onClick={()=>!npc&&onPlayerClick(p)}
                style={{opacity: npc ? 0.5 : 1, cursor: npc ? 'default' : 'pointer'}}>
                <span className={rankClass(i)}>#{i+1}</span>
                <div>
                  <div className="lb-player-name">
                    {p.name}
                    <FactionBadge faction={factions[p.name]||'unknown'} />
                    {npc && <span style={{fontSize:'10px',padding:'1px 6px',background:'var(--card2)',
                      border:'1px solid var(--border)',borderRadius:'4px',color:'var(--text-muted)'}}>NPC</span>}
                    {npc && (
                      <button onClick={e=>{e.stopPropagation();setNpcOverride(p.name,'player');}}
                        style={{fontSize:'10px',padding:'1px 6px',background:'none',border:'1px solid var(--gold)',
                          borderRadius:'4px',color:'var(--gold)',cursor:'pointer'}}>
                        Mark as Player
                      </button>
                    )}
                  </div>
                  <div className="lb-bar-row">
                    <div className="lb-bar-track"><div className="lb-bar-fill" style={{width:pct+'%',background:getColor()}} /></div>
                    <span className="lb-bar-uses">{totalUses} uses</span>
                  </div>
                </div>
                <div className="lb-total" style={{color:getColor()}}>{fmtNum(val)}</div>
              </div>
            );
          }) : <div className="empty">No players match{search?` "${search}"`:''}.</div>}
        </div>
      </div>
    </div>
  );
}

/* ════════════════════ SKILLS ════════════════════ */
/* Inline category badge — click to manually pin a skill to a different category */
function CatBadge({ skillName, autoCategory, skillCats, setSkillCat }) {
  const pinned    = (skillCats||{})[skillName];
  const effective = pinned || autoCategory;
  const icon      = effective==='damage'?'⚔':effective==='healing'?'💚':'✨';
  function cycle() {
    // Cycle: auto → opposite → auto. Healing stays, we only toggle damage ↔ utility.
    if (!pinned) {
      setSkillCat(skillName, autoCategory==='damage' ? 'utility' : 'damage');
    } else {
      setSkillCat(skillName, null); // remove pin, revert to auto
    }
  }
  return (
    <button onClick={e=>{e.stopPropagation();cycle();}}
      title={pinned?`Pinned as ${effective} — click to revert to auto`:`Auto: ${effective} — click to override`}
      style={{background:'none',border:pinned?'1px solid var(--gold)':'1px solid var(--border)',
              borderRadius:'4px',padding:'2px 7px',cursor:'pointer',lineHeight:1,
              color:pinned?'var(--gold)':'var(--text-muted)',fontSize:'13px',transition:'all .15s'}}>
      {icon}
    </button>
  );
}

/* ── Skill detail modal ────────────────────────────────────────────────────
   Shows per-player usage breakdown for any clicked skill row.            */
function SkillModal({ skillName, category, data, factions, setFactions, dur, npcSet, npcOverrides, onClose }) {
  const { skillsMap, players } = data;
  const skillData = skillsMap[skillName] || { totalDmg:0, totalHeal:0, uses:0 };
  const isDmg  = category === 'damage';
  const isHeal = category === 'healing';
  const valColor = isDmg ? 'var(--dmg)' : isHeal ? 'var(--heal)' : 'var(--gold)';
  const barCls   = isDmg ? 'mini-bar-dmg' : isHeal ? 'mini-bar-heal' : 'mini-bar-util';

  // Player clicked inside this modal → open their full PlayerModal on top
  const [selectedPlayer, setSelectedPlayer] = useState(null);

  // Build per-player breakdown from individual player records
  const breakdown = useMemo(() => {
    const list = [];
    for (const [pName, p] of Object.entries(players)) {
      if (isNpc(pName, npcSet, npcOverrides)) continue;
      let uses = 0, value = 0, critCount = 0;
      if (isDmg) {
        const sk = p.skills?.[skillName];
        if (sk?.uses > 0) { uses = sk.uses; value = sk.totalDmg; critCount = sk.critCount || 0; }
      } else if (isHeal) {
        const hsk = p.healSkills?.[skillName];
        if (hsk?.uses > 0) { uses = hsk.uses; value = hsk.totalHeal; }
      } else {
        uses = p.casts?.[skillName] || 0;
      }
      if (uses > 0) list.push({ name:pName, uses, value, critCount });
    }
    return list.sort((a,b) => b.value - a.value || b.uses - a.uses);
  }, [players, skillName, isDmg, isHeal, npcSet, npcOverrides]);

  const maxVal = breakdown[0] ? (breakdown[0].value || breakdown[0].uses) : 1;
  const totalUses = breakdown.reduce((s,p) => s + p.uses, 0);

  useEffect(() => {
    const h = e => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', h);
    return () => window.removeEventListener('keydown', h);
  }, [onClose]);

  const gridCols = isDmg ? '1fr 52px 100px 80px 58px' :
                   isHeal ? '1fr 52px 100px 80px' :
                             '1fr 52px 1fr';

  return (
    <div className="modal-backdrop" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>

              &nbsp;·&nbsp;{breakdown.length} player{breakdown.length !== 1 ? 's' : ''} used this
              &nbsp;·&nbsp;<span style={{color:'var(--gold)',fontSize:'12px'}}>click a row for full player detail</span>
            </div>
          </div>
          <button className="modal-close" onClick={onClose}>✕ Close</button>
        </div>
        <div className="modal-body">
          {/* Summary stats */}
          <div className="g4" style={{gap:'10px',marginBottom:'18px'}}>
            <div className="stat-box">
              <div className="stat-val">{totalUses}</div>
              <div className="stat-lbl">Total Uses</div>
            </div>
            {isDmg && <>
              <div className="stat-box">

            {isHeal && <>

          {breakdown.length ? breakdown.map((p, idx) => {
            const avg      = p.uses > 0 && p.value > 0 ? Math.round(p.value / p.uses) : 0;
            const barVal   = (isDmg || isHeal) ? p.value : p.uses;

                  {(isDmg||isHeal) && (
                    <span style={{textAlign:'right',fontSize:'13px',color:'var(--text-dim)'}}>

    </div>
  );
}

  // Apply effective category (manual pin overrides auto-detect)

  const utilSkills = useMemo(()=>all.filter(s=>getSkillCategory(s.name,s,skillCats)==='utility').sort((a,b)=>b.uses    -a.uses),    [all,skillCats]);

        {sub==='utility' && (
          <>

/* Helper: get total uses of a skill across all data sources */
function totalSkillUses(skillName, data) {
  const fromMap = data.skillsMap[skillName]?.uses || 0;
  if (fromMap > 0) return fromMap;
  return Object.values(data.players).reduce((s,p)=>s+(p.casts[skillName]||0),0);
}

/* Helper: count debuff applications per faction using player debuffsReceived */
function debuffByFaction(debuffName, players, factions) {
  const r = {haranya:0,nuia:0,pirate:0,unknown:0};
  for (const p of Object.values(players)) {
    const f = factions[p.name]||'unknown';
    r[f] = (r[f]||0) + (p.debuffsReceived[debuffName]||0);
  }
  return r;
}

function DebuffsTab({ data, factions, hiddenDebuffs, toggleDebuff }) {
  const { debuffMap, players } = data;
  const [search, setSearch] = useState('');
  const [showHidden, setShowHidden] = useState(false);

  const list = useMemo(() => {
    const q = search.toLowerCase();
    const entries = Object.entries(debuffMap)
      .map(([name,d])=>({ name, count:d.count, uniqueTargets:d.targets.size }))
      .filter(d=>!q||d.name.toLowerCase().includes(q))
      .sort((a,b)=>b.count-a.count);
    return showHidden ? entries : entries.filter(d=>!hiddenDebuffs.has(d.name));
  }, [debuffMap, search, hiddenDebuffs, showHidden]);

  const maxCount = list.filter(d=>!hiddenDebuffs.has(d.name))[0]?.count || 1;
  const hiddenCount = hiddenDebuffs.size;

  // Most debuffed players
  const mostDebuffed = useMemo(() =>
    Object.values(players)
      .map(p=>({ name:p.name, total:Object.values(p.debuffsReceived).reduce((s,c)=>s+c,0), faction:factions[p.name]||'unknown' }))
      .filter(p=>p.total>0)
      .sort((a,b)=>b.total-a.total).slice(0,8)
  , [players,factions]);

  // Key debuff faction comparison
  const KEY_DEBUFFS   = ['Distressed','Charmed','Unguarded','Shackle','Silence'];
  const factionData   = useMemo(()=>KEY_DEBUFFS.map(n=>({name:n,...debuffByFaction(n,players,factions)})),[players,factions]);
  const FACTIONS_SHOW = [
    {key:'haranya',label:'Haranya',color:'var(--har)'},
    {key:'nuia',   label:'Nuia',   color:'var(--nui)'},
    {key:'pirate', label:'Pirate', color:'var(--pir)'},
  ];

  // Helper: per-player skill uses (checks damage → heal → casts to avoid double-counting)
  function skillByFaction(skillName, plrs, facs) {
    const r = {haranya:0,nuia:0,pirate:0,unknown:0};
    for (const p of Object.values(plrs)) {
      const f = facs[p.name]||'unknown';
      const dmg  = p.skills?.[skillName]?.uses  || 0;
      const heal = p.healSkills?.[skillName]?.uses || 0;
      const cast = p.casts?.[skillName] || 0;
      r[f] = (r[f]||0) + ((dmg+heal) > 0 ? (dmg+heal) : cast);
    }
    return r;
  }

  // All key skills in one list (Stillness + Purge first, then shields/abilities)
  const KEY_SKILLS_ALL = [
    'Stillness', 'Purge',
    'Vicious Implosion', 'Necromantic Flame',
    "Immortal Warden's Shield", "Radiant Disciple's Shield", "Disciple's Shield",
  ];
  const KEY_SKILL_SEPARATOR = 2; // draw a divider after this index
  const keySkillData = useMemo(()=>
    KEY_SKILLS_ALL.map(n=>({name:n,...skillByFaction(n,players,factions)}))
  ,[players,factions]);

  // Debuff eye toggle
  function EyeBtn({ name }) {
    const isHidden = hiddenDebuffs.has(name);
    return (
      <button onClick={e=>{e.stopPropagation();toggleDebuff(name);}}
        title={isHidden?'Show this debuff':'Hide this debuff'}
        style={{background:'none',border:'none',cursor:'pointer',padding:'2px 6px',

          opacity:isHidden?0.5:1,transition:'all .15s',borderRadius:'4px',lineHeight:1}}>
        {isHidden?'🚫':'👁'}
      </button>
    );
  }

  return (
    <div>
      {/* ── Key debuff overview: faction comparison ── */}
      <div className="card" style={{marginBottom:'12px'}}>
        <div className="card-title">⚡ Debuff Overview: Distressed, Charmed, Unguarded, Shackle &amp; Silence</div>
        <div style={{fontSize:'12px',color:'var(--text-muted)',marginBottom:'12px'}}>
          How many times each debuff was applied to players of each faction during the session
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',minWidth:'400px'}}>
            <thead>
              <tr>
                <th style={{textAlign:'left',padding:'6px 10px',fontSize:'10px',fontWeight:'700',letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--text-muted)',borderBottom:'1px solid var(--border)'}}>Debuff</th>
                {FACTIONS_SHOW.map(f=>(
                  <th key={f.key} style={{textAlign:'center',padding:'6px 10px',borderBottom:'1px solid var(--border)'}}>
                    <span className={`faction-badge faction-${f.key.slice(0,3)}`}>{f.label}</span>
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {factionData.map(row=>(

          How many times each skill was used by players of each faction

/* ════════════════════ PLAYER MODAL ════════════════════ */
function PlayerModal({ player, data, factions, setFactions, npcSet, npcOverrides, onClose }) {
  const { dur, awards } = data;
  const playerAwards = awards[player.name] || [];
  // Filter out NPC targets so only PvP damage targets appear
  const allTargets  = Object.entries(player.targets).sort((a,b)=>b[1]-a[1]);
  const topTargets  = allTargets.filter(([t])=>!isNpc(t,npcSet,npcOverrides)).slice(0,10);
  const npcTargets  = allTargets.filter(([t])=> isNpc(t,npcSet,npcOverrides));
  const maxTargetDmg = topTargets[0]?.[1] || 1;
  const dmgSkills = Object.entries(player.skills)
    .map(([n,s])=>({name:n,...s})).sort((a,b)=>b.totalDmg-a.totalDmg);
  const healSkillList = Object.entries(player.healSkills)
    .map(([n,s])=>({name:n,...s})).sort((a,b)=>b.totalHeal-a.totalHeal);
  const maxSkillDmg = dmgSkills[0]?.totalDmg || 1;
  const maxSkillHeal = healSkillList[0]?.totalHeal || 1;
  const debuffList = Object.entries(player.debuffsReceived)
    .sort((a,b)=>b[1]-a[1]).slice(0,8);
  const faction = factions[player.name]||'unknown';
  function setF(f) { setFactions(prev=>({...prev,[player.name]:f})); }
  const critRate = player.attackCount > 0 ? Math.round(player.critCount/player.attackCount*100) : 0;
  const bd       = computeDmgBreakdown(player, npcSet, npcOverrides);

  // Clicking a heal target opens their full PlayerModal
  const [linkedPlayer, setLinkedPlayer] = useState(null);

  useEffect(() => {
    const handler = e => { if(e.key==='Escape') onClose(); };
    window.addEventListener('keydown', handler);
    return ()=>window.removeEventListener('keydown', handler);
  }, [onClose]);

  return (
    <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      {/* Linked player detail — opens on top when a heal target is clicked */}
      {linkedPlayer && (
        <PlayerModal
          player={data.players[linkedPlayer]}
          data={data}
          factions={factions}
          setFactions={setFactions}
          npcSet={npcSet}
          npcOverrides={npcOverrides}
          onClose={()=>setLinkedPlayer(null)}
        />
      )}
      <div className="modal-panel">
        <div className="modal-header">
          <div>
            <div style={{display:'flex',alignItems:'center',gap:'10px',marginBottom:'6px'}}>
              <div className="modal-player-name">{player.name}</div>
              <FactionBadge faction={faction} />
            </div>
            <div style={{fontSize:'13px',color:'var(--text-muted)'}}>Detailed combat breakdown</div>
            {/* Faction quick-assign */}
            <div style={{display:'flex',gap:'5px',marginTop:'8px'}}>
              {[['haranya','har','Haranya'],['nuia','nui','Nuia'],['pirate','pir','Pirate'],['unknown','unk','Unknown']].map(([fid,cls,label])=>(
                <button key={fid} className={`faction-sel-btn ${cls}${faction===fid?' active':''}`}
                  onClick={()=>setF(fid)}>{label}</button>
              ))}
            </div>
          </div>
          <button className="modal-close" onClick={onClose}>✕ Close</button>
        </div>
        <div className="modal-body">
          {/* Awards */}
          {playerAwards.length > 0 && (
            <div className="modal-section">
              <div className="modal-section-title">🏆 Awards</div>
              <div style={{fontSize:'12px',color:'var(--text-muted)',marginBottom:'8px'}}>Skills where {player.name} ranked #1 in total damage</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:'4px'}}>
                {playerAwards.sort((a,b)=>b.dmg-a.dmg).map(a=>(
                  <span key={a.skill} className="award-chip">🏆 {a.skill}</span>
                ))}
              </div>
            </div>
          )}

          {/* Stat cards */}
          <div className="modal-section">
            <div className="g4" style={{gap:'10px'}}>
              <div className="stat-box">
                <div className="stat-val dmg">{fmtNum(bd.total)}</div>
                <div className="stat-lbl">Total Damage</div>
              </div>
              <div className="stat-box">
                <div className="stat-val dmg">{fmtNum(bd.pvp)}</div>
                <div className="stat-lbl">PvP Damage</div>
              </div>
              <div className="stat-box">
                <div className="stat-val" style={{color:'var(--gold)'}}>{fmtNum(bd.boss)}</div>
                <div className="stat-lbl">Boss Damage</div>
              </div>
              <div className="stat-box">
                <div className="stat-val heal">{fmtNum(player.totalHeal)}</div>
                <div className="stat-lbl">Total Healing</div>
              </div>
              <div className="stat-box">

          {healSkillList.length > 0 && (
            <div className="modal-section">
              <div className="modal-section-title">💚 Healing Skills</div>

/* ════════════════════ UPLOAD SCREEN ════════════════════ */
function UploadScreen({ onLoad }) {
  const [dragging, setDragging] = useState(false);
  const [loading, setLoading]   = useState(false);
  const [error, setError]       = useState('');
  const fileRef = useRef();

  function handleFile(file) {
    if (!file) return;
    setLoading(true); setError('');
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const parsed = parseLog(e.target.result);
        const playerCount = Object.keys(parsed.players).length;
        if (playerCount === 0) throw new Error('No combat events found. Make sure this is an ArcheAge combat log.');
        onLoad(parsed);
      } catch(err) {
        setError(err.message);
      }
      setLoading(false);
    };
    reader.onerror = () => { setError('Failed to read file.'); setLoading(false); };
    reader.readAsText(file, 'utf-8');
  }

  function onDrop(e) {
    e.preventDefault(); setDragging(false);
    handleFile(e.dataTransfer.files[0]);
  }

  return (
    <div className="upload-page">
      <div style={{marginBottom:'32px',textAlign:'center'}}>
        <div style={{fontFamily:'Cinzel,serif',fontSize:'13px',fontWeight:'700',letterSpacing:'4px',color:'var(--text-muted)',textTransform:'uppercase',marginBottom:'8px'}}>ArcheAge</div>
        <div style={{fontFamily:'Cinzel,serif',fontSize:'32px',fontWeight:'900',letterSpacing:'4px',
          background:'linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold))',
          WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>
          Combat Log Analyzer
        </div>
        <div style={{fontSize:'14px',color:'var(--text-muted)',marginTop:'8px'}}>
          Parse and visualize your ArcheAge combat data
        </div>
      </div>

      <div
        className={'upload-area'+(dragging?' drag-over':'')}
        onDragOver={e=>{e.preventDefault();setDragging(true)}}
        onDragLeave={()=>setDragging(false)}
        onDrop={onDrop}
        onClick={()=>fileRef.current?.click()}
      >
        <span className="upload-icon">⚔</span>
        <div className="upload-title">DROP YOUR COMBAT LOG</div>
        <div className="upload-hint">
          Drag and drop your <strong>.log</strong> or <strong>.txt</strong> combat log file here,<br/>
          or click to browse. The file is parsed entirely in your browser — nothing is uploaded.
        </div>
        <div className="upload-btn">
          {loading ? 'Parsing…' : '📂 Choose File'}
        </div>
        <input ref={fileRef} type="file" accept=".log,.txt" style={{display:'none'}}
          onChange={e=>handleFile(e.target.files[0])} />
      </div>

      {error && (
        <div style={{marginTop:'16px',padding:'12px 18px',background:'var(--danger-bg)',border:'1px solid var(--danger)',borderRadius:'8px',color:'var(--danger)',fontSize:'13px',maxWidth:'520px',width:'100%'}}>
          ⚠ {error}
        </div>
      )}

      <div style={{marginTop:'32px',display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'12px',maxWidth:'520px',width:'100%'}}>
        {[
          ['⚔','Damage Leaderboard','Player rankings by total, PvP & PvE damage'],
          ['✨','Skill Breakdown','Every skill: uses, total damage, DPS'],
          ['⚡','Debuff Tracking','Debuffs applied — count, unique targets'],
        ].map(([icon,title,desc])=>(
          <div key={title} style={{padding:'14px',background:'var(--card)',border:'1px solid var(--border)',borderRadius:'8px',textAlign:'center'}}>
            <div style={{fontSize:'22px',marginBottom:'6px'}}>{icon}</div>
            <div style={{fontFamily:'Cinzel,serif',fontSize:'11px',fontWeight:'700',letterSpacing:'1px',color:'var(--gold)',marginBottom:'4px'}}>{title}</div>
            <div style={{fontSize:'11px',color:'var(--text-muted)',lineHeight:'1.4'}}>{desc}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ════════════════════ ROOT APP ════════════════════ */
function App() {
  const [dark, setDark] = useState(true);
  const [data, setData] = useState(null);

  // NPC set — loaded once from embedded gzip blob
  const [npcSet, setNpcSet] = useState(null);
  useEffect(() => { loadNpcSet().then(s => setNpcSet(s)); }, []);

  // Persisted state — all backed by localStorage
  const [factions,      _setFactions]     = useState(() => loadFactions());
  const [hiddenSkills,  _setHiddenSkills] = useState(() => loadHiddenSkills());
  const [hiddenDebuffs, _setHiddenDebuffs]= useState(() => loadHiddenDebuffs());
  const [skillCats,     _setSkillCats]    = useState(() => loadSkillCats());
  const [npcOverrides,  _setNpcOverrides] = useState(() => loadNpcOverrides());

  function setFactions(updater) {
    _setFactions(prev => { const next = typeof updater==='function'?updater(prev):updater; saveFactions(next); return next; });
  }
  function toggleSkill(name) {
    _setHiddenSkills(prev => { const s=new Set(prev); s.has(name)?s.delete(name):s.add(name); saveHiddenSkills(s); return s; });
  }
  function clearHiddenSkills() { _setHiddenSkills(new Set()); saveHiddenSkills(new Set()); }

  function toggleDebuff(name) {
    _setHiddenDebuffs(prev => { const s=new Set(prev); s.has(name)?s.delete(name):s.add(name); saveHiddenDebuffs(s); return s; });
  }

  function setSkillCat(name, cat) {
    _setSkillCats(prev => {
      const next = {...prev};
      if (cat === null || cat === undefined) delete next[name]; else next[name] = cat;
      saveSkillCats(next); return next;
    });
  }
  function setNpcOverride(name, status) {
    _setNpcOverrides(prev => {
      const next = {...prev};
      if (status === null || status === undefined) delete next[name]; else next[name] = status;
      saveNpcOverrides(next); return next;
    });
  }

  /* ── Export all localStorage customisations to a .txt file ────────────── */
  function exportSettings() {
    const hidden   = [...loadHiddenSkills()].sort();
    const hiddenDb = [...loadHiddenDebuffs()].sort();
    const cats     = loadSkillCats();
    const overrides= loadNpcOverrides();
    const facs     = loadFactions();

    const lines = [
      '# ArcheAge Combat Analyzer — Settings Export',
      '# Generated: ' + new Date().toISOString(),
      '# Send this file back to have your changes baked into the app for everyone.',
      '',
      '[hidden_skills]  # ' + hidden.length + ' skills hidden from the Skill Breakdown tab',
      ...hidden,
      '',
      '[hidden_debuffs]  # ' + hiddenDb.length + ' debuffs hidden from the Debuffs tab',
      ...hiddenDb,
      '',
      '[skill_categories]  # manual Damage ↔ Utility overrides  (format: SkillName=damage|utility)',
      ...Object.entries(cats).sort().map(([k,v])=>k+'='+v),
      '',
      '[npc_overrides]  # names you manually marked as Player or NPC  (format: Name=player|npc)',
      ...Object.entries(overrides).sort().map(([k,v])=>k+'='+v),
      '',
      '[factions]  # persistent faction assignments  (format: PlayerName=haranya|nuia|pirate)',
      ...Object.entries(facs).filter(([,f])=>f!=='unknown').sort().map(([k,v])=>k+'='+v),
      '',
      '[json_data]  # machine-readable — do not edit',
      JSON.stringify({ version:2, hiddenSkills:hidden, hiddenDebuffs:hiddenDb,
        skillCategories:cats, npcOverrides:overrides,
        factions:Object.fromEntries(Object.entries(facs).filter(([,f])=>f!=='unknown'))
      }, null, 2),
    ];
    const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = 'aa-settings-' + Date.now() + '.txt';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  function handleLoad(parsed) { setData(parsed); }
  function handleReset()      { setData(null); }

  const npcLoaded = npcSet !== null;

  return (
    <div data-theme={dark?'dark':'light'}>
      <div className="app-header">
        <div>
          <div className="app-title">⚔ COMBAT LOG ANALYZER</div>
          <div className="app-sub">ArcheAge · Session Report</div>
          <div className="app-sub">Made by Ash</div>
        </div>
        <div className="header-right">
          {data && (
            <>
              <div style={{fontSize:'12px',color:'var(--text-muted)'}}>
                {Object.values(data.players).filter(p=>!isNpc(p.name,npcSet,npcOverrides)).length} players
                {npcLoaded && ` · ${Object.values(data.players).filter(p=>isNpc(p.name,npcSet,npcOverrides)).length} NPCs filtered`}
                {' · '}{fmtDur(data.dur)}
              </div>
              <button className="icon-btn" onClick={exportSettings} title="Download all your settings as a .txt file">
                📥 Export Settings
              </button>
              <button className="icon-btn" onClick={handleReset}>📂 Load New Log</button>
            </>
          )}
          <button className="icon-btn" onClick={()=>setDark(d=>!d)}>
            {dark ? '☀ Light' : '☾ Dark'}
          </button>
        </div>
      </div>
      {data
        ? <Dashboard data={data} factions={factions} setFactions={setFactions}
                     hiddenSkills={hiddenSkills} toggleSkill={toggleSkill} clearHiddenSkills={clearHiddenSkills}
                     hiddenDebuffs={hiddenDebuffs} toggleDebuff={toggleDebuff}
                     npcSet={npcSet} npcOverrides={npcOverrides} setNpcOverride={setNpcOverride}
                     skillCats={skillCats} setSkillCat={setSkillCat}
                     dark={dark} setDark={setDark} />
        : <UploadScreen onLoad={handleLoad} />
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
